    <h2>Formularios</h2>
    <br>
    <form>
        <div>
            <label for="nome">Nome: </label>
            <input type="text">
        </div>
        <br>

        <div>
            <label for="Idade">Idade: </label>
            <input type="number" min="1" max="120">
        </div>
        <br>

        <div>
            <label for="Usuario">Usuario: </label>
            <input type="text">
        </div>
        <br>

        <div>
            <label for="Senha">Senha: </label>
            <input type="password">
        </div>
        <br>

        <div>
            <label for="dataEvento">Data do Evento:</label>
            <input type="time">
        </div>
        <br>
        <div>
            <label for="">
                Telefone: 
                <input type="tel" required placeholder="(XX)XXXXX-XXXX">
            </label>
        </div>
        <br>

        <div>
            <label for="email">
                E-mail: <input type="email" required placeholder="nome@dominio.com">
            </label>
        </div>
        <br>

        <div>
            <label for="salario">
                Salario: <input type="number" min="1" max="2000" step="0.1">
            </label>
        </div>
        <br>

        <div>
            <label for="volume">
                Volume: <input type="range" min="0" max="100" step="5">
            </label>
        </div>
        <br>

        <div>
            <fieldset>
                <legend>Estado Civil</legend>
                <p>
                    <label for="est_civil">
                        <input type="radio" name="est_civil" value="casado"> Casado
                    </label>
                </p>

                <p>
                    <label for="est_civil">
                        <input type="radio" name="est_civil" value="solteiro"> Solteiro
                    </label>
                </p>

                <p>
                    <label for="est_civil">
                        <input type="radio" name="est_civil" value="divorciado"> Divorciado
                    </label>
                </p>
                </fieldeset>
        </div>
        <br>

        <div>
            <fieldset>
                <legend>Produtos</legend>
                <p>
                    <label>
                        <input type="checkbox" name="computador" value="computador"> Computador
                    </label>
                </p>

                <p>
                    <label>
                        <input type="checkbox" name="monitor" value="monitor"> Monitor
                    </label>
                </p>

                <p>
                    <label>
                        <input type="checkbox" name="impressora" value="impressora"> Impressora
                    </label>
                </p>
            </fieldset>
        </div>

        <div>
            <label>
                Deixe sua sugestão:
                <textarea cols="30" rows="5"></textarea>
            </label>
        </div>
        <br>

        <div>
            <p>
                <label>
                    Site: <input type="url" list="sites" name="link">
                </label>
            </p>
            <datalist id="sites">
                <option label="Youtube" value="https://www.youtube.com/"></option>

                <option label="Portal Unipam" value="https://portal.unipam.edu.br/login"></option>

                <option label="Site Unipam" value="https://unipam.edu.br/"></option>
            </datalist>
        </div>
        <br>

        <div>
            <p>
                <label>
                    Carro:
                    <select name="carros" required>
                        <optgroup label="1 Esportivos">
                            <option value="1.1">Ferrari</option>
                            <option value="1.2">Porsche</option>
                            <option value="1.3">Lamborghini</option>

                        <optgroup label="2 Popular">
                            <option value="2.1">Corsa</option>
                            <option value="2.2">Uno</option>
                            <option value="2.3">Gol</option>
                            <option value="2.4">Palio</option>

                    </select>
                </label>
            </p>
        </div>

        <button type="submit">Enviar</button>
    </form>
</body>

</html>
